<body>
  <div class="login-card" role="main" aria-label="Login card">
    <div class="login-header">
      <div class="brand-icon"><i class="fas fa-lock"></i></div>
      <h1>Welcome back</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" autocomplete="on" novalidate>
      <div class="input-group">
        <label for="email"><i class="fas fa-envelope" style="margin-right: 6px;"></i> Email</label>
        <div class="input-field">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="hello@example.com" value="demo@example.com" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password"><i class="fas fa-key" style="margin-right: 6px;"></i> Password</label>
        <div class="input-field">
          <i class="fas fa-key"></i>
          <input type="password" id="password" placeholder="••••••••" value="demo123" required>
          <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

          <input type="checkbox" id="rememberCheck" checked> Remember me
        </label>

      </div>

        <i class="fas fa-sign-in-alt"></i> Log In
      </button>

      <div id="loginFeedback"></div>
    </form>

      Don’t have an account? <a href="#" id="signupLink">Sign up</a>
    </div>

    <!-- Demo hint / fully working -->

      <i class="fas fa-check-circle"></i> <strong>Fully working</strong> · try <span style="background:#eef5ff; padding:0.1rem 0.6rem; border-radius:20px; font-weight:500;">demo@example.com</span> / <span style="background:#eef5ff; padding:0.1rem 0.6rem; border-radius:20px; font-weight:500;">demo123</span>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // DOM refs
      const loginForm = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const togglePasswordBtn = document.getElementById('togglePasswordBtn');
      const toggleIcon = document.getElementById('toggleIcon');
      const rememberCheck = document.getElementById('rememberCheck');
      const loginFeedback = document.getElementById('loginFeedback');
      const forgotLink = document.getElementById('forgotLink');
      const signupLink = document.getElementById('signupLink');

      // --- demo credentials ---
      const DEMO_EMAIL = 'demo@example.com';
      const DEMO_PASSWORD = 'demo123';

      // --- toggle password visibility ---
      togglePasswordBtn.addEventListener('click', function(e) {
        e.preventDefault();
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        toggleIcon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
      });

      // --- show feedback helper ---
      function setFeedback(message, isError = false, isSuccess = false) {
        loginFeedback.textContent = message;
        loginFeedback.classList.remove('error-feedback', 'success-feedback');
        if (isError) loginFeedback.classList.add('error-feedback');
        if (isSuccess) loginFeedback.classList.add('success-feedback');
        if (!message) {
          loginFeedback.classList.remove('error-feedback', 'success-feedback');
        }
      }

      // --- validate email format (simple) ---
      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      // --- handle login submit ---
      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();

        // Reset feedback
        setFeedback('');

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const remember = rememberCheck.checked;

        // 1. validation
        if (!email || !password) {
          setFeedback('Please fill in both email and password.', true);
          return;
        }

        if (!isValidEmail(email)) {
          setFeedback('Please enter a valid email address.', true);
          return;
        }

        if (password.length < 4) {
          setFeedback('Password must be at least 4 characters.', true);
          return;
        }

        // 2. check credentials (demo)
        if (email === DEMO_EMAIL && password === DEMO_PASSWORD) {
          // success
          setFeedback('✅ Login successful! Welcome back.', false, true);

          // simulate "remember me" (just feedback)
          if (remember) {
            console.log('Remember me checked — (demo: would persist session)');
          } else {
            console.log('Remember me not checked.');
          }

          // optional: tiny ui feedback
          const btn = document.getElementById('loginBtn');
          btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Logging in...';
          btn.disabled = true;
          setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Logged in';
            btn.style.background = 'linear-gradient(135deg, #1f9d6a, #1a7a52)';
            // reset after 3s (just for demo)
            setTimeout(() => {
              btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log In';
              btn.style.background = '';
              btn.disabled = false;
              setFeedback('');
            }, 2500);
          }, 800);

        } else {
          // wrong credentials
          setFeedback('❌ Invalid email or password. Try demo@example.com / demo123', true);
          // shake animation (simple)
          loginForm.style.animation = 'shake 0.3s ease';
          setTimeout(() => { loginForm.style.animation = ''; }, 400);
        }
      });

      // --- inject keyframe shake (dynamic) ---
      const styleShake = document.createElement('style');
      styleShake.textContent = `
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          20% { transform: translateX(-8px); }
          40% { transform: translateX(8px); }
          60% { transform: translateX(-4px); }
          80% { transform: translateX(4px); }
        }
      `;
      document.head.appendChild(styleShake);

      // --- "Forgot password" interactive demo ---
      forgotLink.addEventListener('click', function(e) {
        e.preventDefault();
        const email = emailInput.value.trim();
        if (!email || !isValidEmail(email)) {
          setFeedback('Please enter your email address to reset password.', true);
          return;
        }
        setFeedback(`✉️ Password reset link sent to ${email} (demo)`, false, true);
        setTimeout(() => {
          setFeedback('');
        }, 3500);
      });

      // --- "Sign up" interactive demo ---
      signupLink.addEventListener('click', function(e) {
        e.preventDefault();
        setFeedback('📝 Redirect to sign-up page (demo action)', false, true);
        setTimeout(() => {
          setFeedback('');
        }, 2500);
      });

      // --- additional: real-time clear feedback on typing ---
      emailInput.addEventListener('input', function() {
        if (loginFeedback.textContent) setFeedback('');
      });
      passwordInput.addEventListener('input', function() {
        if (loginFeedback.textContent) setFeedback('');
      });

      // --- prefill demo hint (already set in value) ---
      // ensure the toggle icon matches initial type
      // (password type, icon eye)
      // already correct.

      console.log('✅ Login page fully working (demo)');
    })();
  </script>
</body>
</html>
